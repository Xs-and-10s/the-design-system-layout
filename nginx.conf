server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve files; fall back to index.html for any path that isn't a real file.
    # This means /patterns.html, /gallery.html, etc. all work directly.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Serve .html files without requiring the extension in the URL.
    # e.g. /patterns → serves patterns.html
    location ~ ^/([a-z0-9-]+)$ {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Security: don't expose dotfiles
    location ~ /\. {
        deny all;
    }

    # Cache static assets aggressively (fonts, images, etc.)
    # HTML files get no-cache so deploys are reflected immediately.
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(css|js|woff2|woff|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip everything useful
    gzip            on;
    gzip_types      text/html text/css application/javascript
                    image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Reasonable defaults
    client_max_body_size 4m;
    keepalive_timeout    65;
}
