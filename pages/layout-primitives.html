<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Primitives — @the-design-system/layout</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
        />
        <style>
            /* ── LAYERS ── */
            @layer ds.reset, ds.tokens, ds.base, ds.presence,
       ds.layout, ds.prose, ds.motion, ds.components, ds.compat;

            @layer ds.reset {
                :where(*, *::before, *::after) {
                    box-sizing: border-box;
                }
                :where([hidden]) {
                    display: none !important;
                }
                :where(html) {
                    -webkit-text-size-adjust: 100%;
                    text-size-adjust: 100%;
                }
                :where(body) {
                    margin: 0;
                }
                :where(img, picture, video, canvas, svg) {
                    display: block;
                    max-inline-size: 100%;
                    block-size: auto;
                }
                :where(input, button, textarea, select) {
                    margin: 0;
                    font: inherit;
                    color: inherit;
                }
                :where(button) {
                    cursor: pointer;
                }
                :where(h1, h2, h3, h4, h5, h6) {
                    text-wrap: balance;
                }
                :where(p) {
                    text-wrap: pretty;
                    overflow-wrap: break-word;
                }
                :where(:focus-visible) {
                    outline: 2px solid Highlight;
                    outline-offset: 2px;
                }
                :where(:focus:not(:focus-visible)) {
                    outline: none;
                }
            }

            @layer ds.tokens {
                :root {
                    --ds-color-scheme: dark;
                    --ds-measure: 65ch;
                    --ds-threshold: 45rem;
                    --ds-z-base: 0;
                    --ds-z-raised: 1;
                    --ds-z-dropdown: 10;
                    --ds-z-sticky: 20;
                    --ds-z-overlay: 30;
                    --ds-z-modal: 40;
                    --ds-z-toast: 50;
                    --ds-safe-top: env(safe-area-inset-top, 0px);
                    --ds-safe-bottom: env(safe-area-inset-bottom, 0px);
                    --ds-ratio-min: 1.3333;
                    --ds-ratio-max: 1.5;
                    --ds-ratio-fluid-from: 20rem;
                    --ds-ratio-fluid-to: 80rem;
                    --ds-ratio: clamp(
                        var(--ds-ratio-min),
                        calc(
                            var(--ds-ratio-min) +
                                (var(--ds-ratio-max) - var(--ds-ratio-min)) *
                                (100vw - var(--ds-ratio-fluid-from)) /
                                (
                                    var(--ds-ratio-fluid-to) -
                                        var(--ds-ratio-fluid-from)
                                )
                        ),
                        var(--ds-ratio-max)
                    );
                    --_ds-r2: calc(var(--ds-ratio) * var(--ds-ratio));
                    --_ds-r3: calc(var(--_ds-r2) * var(--ds-ratio));
                    --_ds-r4: calc(var(--_ds-r3) * var(--ds-ratio));
                    --_ds-r5: calc(var(--_ds-r4) * var(--ds-ratio));
                    --_ds-r-1: calc(1/var(--ds-ratio));
                    --_ds-r-2: calc(1/var(--_ds-r2));
                    --_ds-r-3: calc(1/var(--_ds-r3));
                    --_ds-r-4: calc(1/var(--_ds-r4));
                    --_ds-r-5: calc(1/var(--_ds-r5));
                    --ds-space-base-min: 1rem;
                    --ds-space-base-max: 1.5rem;
                    --ds-space-base: clamp(
                        var(--ds-space-base-min),
                        0.85rem + 0.6vw,
                        var(--ds-space-base-max)
                    );
                    --ds-space-base-sum: calc(
                        var(--ds-space-base-min) + var(--ds-space-base-max)
                    );
                    --ds-space-base-inv: calc(
                        var(--ds-space-base-sum) - var(--ds-space-base)
                    );
                    --ds-space-tiny: calc(
                        var(--ds-space-base) * var(--_ds-r-5)
                    );
                    --ds-space-xxxs: calc(
                        var(--ds-space-base) * var(--_ds-r-4)
                    );
                    --ds-space-xxs: calc(var(--ds-space-base) * var(--_ds-r-3));
                    --ds-space-xs: calc(var(--ds-space-base) * var(--_ds-r-2));
                    --ds-space-s: calc(var(--ds-space-base) * var(--_ds-r-1));
                    --ds-space-m: var(--ds-space-base);
                    --ds-space-l: calc(var(--ds-space-base) * var(--ds-ratio));
                    --ds-space-xl: calc(var(--ds-space-base) * var(--_ds-r2));
                    --ds-space-xxl: calc(var(--ds-space-base) * var(--_ds-r3));
                    --ds-space-xxxl: calc(var(--ds-space-base) * var(--_ds-r4));
                    --ds-space-huge: calc(var(--ds-space-base) * var(--_ds-r5));
                    --ds-space-xs-s: calc(
                        (var(--ds-space-xs)+var(--ds-space-s)) / 2
                    );
                    --ds-space-s-m: calc(
                        (var(--ds-space-s)+var(--ds-space-m)) / 2
                    );
                    --ds-space-m-l: calc(
                        (var(--ds-space-m)+var(--ds-space-l)) / 2
                    );
                    --ds-space-l-xl: calc(
                        (var(--ds-space-l)+var(--ds-space-xl)) / 2
                    );
                    --ds-space-xl-xxl: calc(
                        (var(--ds-space-xl)+var(--ds-space-xxl)) / 2
                    );
                    --ds-space-m-s: calc(
                        (var(--ds-space-base-inv)+var(--ds-space-s)) / 2
                    );
                    --ds-text-ratio: var(--ds-ratio);
                    --_ds-tr2: calc(
                        var(--ds-text-ratio) * var(--ds-text-ratio)
                    );
                    --_ds-tr3: calc(var(--_ds-tr2) * var(--ds-text-ratio));
                    --_ds-tr4: calc(var(--_ds-tr3) * var(--ds-text-ratio));
                    --_ds-tr-1: calc(1/var(--ds-text-ratio));
                    --_ds-tr-2: calc(1/var(--_ds-tr2));
                    --ds-text-base: 1rem;
                    --ds-text-xs: calc(var(--ds-text-base) * var(--_ds-tr-2));
                    --ds-text-s: calc(var(--ds-text-base) * var(--_ds-tr-1));
                    --ds-text-m: var(--ds-text-base);
                    --ds-text-l: calc(
                        var(--ds-text-base) * var(--ds-text-ratio)
                    );
                    --ds-text-xl: calc(var(--ds-text-base) * var(--_ds-tr2));
                    --ds-text-xxl: calc(var(--ds-text-base) * var(--_ds-tr3));
                    --ds-text-xxxl: calc(var(--ds-text-base) * var(--_ds-tr4));
                    --ds-gap: var(--ds-space-s-m);
                    --ds-gap-ui: var(--ds-space-s-m);
                }
                @media (pointer: coarse) {
                    :root {
                        --ds-gap-ui: var(--ds-space-m-s);
                    }
                }
                :where(.golden) {
                    --ds-ratio-min: 1.618;
                    --ds-ratio-max: 1.618;
                }
                :where(.major-third) {
                    --ds-ratio-min: 1.25;
                    --ds-ratio-max: 1.25;
                }
            }

            @layer ds.base {
                :where(html) {
                    color: CanvasText;
                    background: Canvas;
                    color-scheme: dark;
                }
                :where(a) {
                    color: inherit;
                }
            }

            @layer ds.layout {
                :where([vt-name]) {
                    view-transition-name: var(--ds-vt-name);
                }
                :where(stacked-layout) {
                    display: flex;
                    flex-direction: column;
                    gap: var(--ds-stacked-gap, var(--ds-gap, 1rem));
                    align-items: var(--ds-stacked-align, stretch);
                }
                :where(stacked-layout > *) {
                    min-inline-size: 0;
                }
                :where(stacked-layout[deep]) {
                    display: block;
                }
                :where(stacked-layout[deep]*) {
                    margin: 0;
                }
                :where(stacked-layout[deep]* + *) {
                    margin-block-start: var(
                        --ds-stacked-gap,
                        var(--ds-gap, 1rem)
                    );
                }
                :where(cluster-layout) {
                    display: flex;
                    flex-wrap: wrap;
                    gap: var(--ds-cluster-gap, var(--ds-gap, 1rem));
                    align-items: var(--ds-cluster-align, center);
                    justify-content: var(--ds-cluster-justify, flex-start);
                }
                :where(cluster-layout > *) {
                    min-inline-size: 0;
                }
                :where(cluster-layout[ui]) {
                    --ds-cluster-gap: var(--ds-gap-ui, var(--ds-gap, 1rem));
                }
                :where(cluster-layout[no-wrap]) {
                    flex-wrap: nowrap;
                }
                :where(repel-layout) {
                    display: flex;
                    flex-wrap: nowrap;
                    justify-content: space-between;
                    align-items: var(--ds-repel-align, center);
                    gap: var(--ds-repel-gap, var(--ds-gap, 1rem));
                }
                :where(repel-layout > *) {
                    min-inline-size: 0;
                }
                :where(repel-layout[wrap]) {
                    flex-wrap: wrap;
                }
                :where(split-layout) {
                    display: flex;
                    flex-wrap: wrap;
                    gap: var(--ds-split-gap, var(--ds-gap, 1rem));
                }
                :where(split-layout > *) {
                    flex-grow: 1;
                    flex-basis: calc(
                        (
                                var(
                                        --ds-split-threshold,
                                        var(--ds-threshold, 45rem)
                                    )-100%
                            ) *
                            999
                    );
                    min-inline-size: 0;
                }
                :where(split-layout[horizontally]) {
                    flex-wrap: nowrap;
                }
                :where(split-layout[horizontally] > *) {
                    flex-basis: auto;
                    flex-shrink: 1;
                }
                :where(split-layout[vertically]) {
                    flex-direction: column;
                    flex-wrap: nowrap;
                }
                :where(columns-layout) {
                    display: grid;
                    grid-template-columns: var(
                        --ds-columns-cols,
                        repeat(3, 1fr)
                    );
                    grid-template-rows: var(--ds-columns-rows, auto);
                    row-gap: var(
                        --ds-columns-gap-block,
                        var(--ds-columns-gap, var(--ds-gap, 1rem))
                    );
                    column-gap: var(
                        --ds-columns-gap-inline,
                        var(--ds-columns-gap, var(--ds-gap, 1rem))
                    );
                    align-items: var(--ds-columns-align, stretch);
                    justify-items: var(--ds-columns-justify, stretch);
                }
                :where(columns-layout > *) {
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(rows-layout) {
                    display: grid;
                    grid-template-rows: var(--ds-rows-rows, repeat(3, auto));
                    grid-template-columns: var(--ds-rows-cols, 1fr);
                    row-gap: var(
                        --ds-rows-gap-block,
                        var(--ds-rows-gap, var(--ds-gap, 1rem))
                    );
                    column-gap: var(
                        --ds-rows-gap-inline,
                        var(--ds-rows-gap, var(--ds-gap, 1rem))
                    );
                }
                :where(rows-layout > *) {
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(fluid-grid-layout) {
                    display: grid;
                    row-gap: var(
                        --ds-fluid-grid-gap-block,
                        var(--ds-fluid-grid-gap, var(--ds-gap, 1rem))
                    );
                    column-gap: var(
                        --ds-fluid-grid-gap-inline,
                        var(--ds-fluid-grid-gap, var(--ds-gap, 1rem))
                    );
                    --_fg-repeat: var(--ds-fluid-grid-columns, auto-fit);
                    grid-template-columns: repeat(
                        var(--_fg-repeat),
                        minmax(
                            min(100%, var(--ds-fluid-grid-min, 16rem)),
                            var(--ds-fluid-grid-max, 1fr)
                        )
                    );
                    align-items: var(--ds-fluid-grid-align, stretch);
                }
                :where(fluid-grid-layout > *) {
                    min-inline-size: 0;
                }
                :where(fluid-grid-layout[fill]) {
                    --_fg-repeat: var(--ds-fluid-grid-columns, auto-fill);
                }
                :where(sandwich-layout) {
                    display: grid;
                    grid-template-rows:
                        var(--ds-sandwich-size-bs, auto) var(
                            --ds-sandwich-size-ml,
                            1fr
                        )
                        var(--ds-sandwich-size-be, auto);
                    --_sm: 100vh;
                    min-block-size: var(--ds-sandwich-min, var(--_sm));
                }
                @supports (min-block-size: 100svh) {
                    :where(sandwich-layout) {
                        --_sm: 100svh;
                    }
                }
                @supports (min-block-size: 100dvh) {
                    :where(sandwich-layout) {
                        --_sm: 100dvh;
                    }
                }
                :where(sandwich-layout > *) {
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(bookend-layout) {
                    display: grid;
                    grid-template-columns:
                        var(--ds-bookend-size-is, auto) var(
                            --ds-bookend-size-ml,
                            1fr
                        )
                        var(--ds-bookend-size-ie, auto);
                }
                :where(bookend-layout > *) {
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(region-layout) {
                    display: block;
                    --ds-region-pad-inline: var(--ds-gap, 1rem);
                    padding-block: var(
                        --ds-region-pad-block,
                        var(--ds-space-l-xl, 2rem)
                    );
                    padding-inline: var(--ds-region-pad-inline);
                    background: var(--ds-region-bg, transparent);
                }
                :where(centered-layout) {
                    display: block;
                    box-sizing: content-box;
                    max-inline-size: var(
                        --ds-centered-max,
                        var(--ds-measure, 65ch)
                    );
                    margin-inline: auto;
                    padding-inline: var(--ds-centered-gutter, 0px);
                    min-inline-size: 0;
                }
                :where(breakout-layout) {
                    display: block;
                    margin-inline: calc(
                        -1 *
                            var(
                                --ds-breakout-size,
                                var(--ds-region-pad-inline, 0px)
                            )
                    );
                    padding-inline: var(--ds-breakout-pad, 0px);
                }
                :where(breakin-layout) {
                    display: block;
                    box-sizing: content-box;
                    max-inline-size: var(
                        --ds-breakin-max,
                        var(--ds-measure, 65ch)
                    );
                    margin-inline: auto;
                    padding-inline: var(--ds-breakin-gutter, 0px);
                    min-inline-size: 0;
                }
                :where(quadrilateral-layout) {
                    display: block;
                    padding-block-start: var(
                        --ds-quad-pbs,
                        var(--ds-quad-pad-block, var(--ds-quad-pad, 0))
                    );
                    padding-block-end: var(
                        --ds-quad-pbe,
                        var(--ds-quad-pad-block, var(--ds-quad-pad, 0))
                    );
                    padding-inline-start: var(
                        --ds-quad-pis,
                        var(--ds-quad-pad-inline, var(--ds-quad-pad, 0))
                    );
                    padding-inline-end: var(
                        --ds-quad-pie,
                        var(--ds-quad-pad-inline, var(--ds-quad-pad, 0))
                    );
                    border-block-start: var(
                        --ds-quad-border-bs,
                        var(--ds-quad-border-block, var(--ds-quad-border, 0))
                    );
                    border-block-end: var(
                        --ds-quad-border-be,
                        var(--ds-quad-border-block, var(--ds-quad-border, 0))
                    );
                    border-inline-start: var(
                        --ds-quad-border-is,
                        var(--ds-quad-border-inline, var(--ds-quad-border, 0))
                    );
                    border-inline-end: var(
                        --ds-quad-border-ie,
                        var(--ds-quad-border-inline, var(--ds-quad-border, 0))
                    );
                    border-start-start-radius: var(
                        --ds-quad-radius-ss,
                        var(--ds-quad-radius, 0)
                    );
                    border-start-end-radius: var(
                        --ds-quad-radius-se,
                        var(--ds-quad-radius, 0)
                    );
                    border-end-start-radius: var(
                        --ds-quad-radius-es,
                        var(--ds-quad-radius, 0)
                    );
                    border-end-end-radius: var(
                        --ds-quad-radius-ee,
                        var(--ds-quad-radius, 0)
                    );
                    background: var(--ds-quad-bg, transparent);
                    color: var(--ds-quad-fg, inherit);
                    box-shadow: var(--ds-quad-shadow, none);
                }
                :where(aspect-ratio-layout) {
                    display: block;
                    position: relative;
                    aspect-ratio: var(
                        --ds-aspect-ratio,
                        var(--ds-aspect-ratio-default, 16/9)
                    );
                    overflow: var(--ds-aspect-overflow, hidden);
                }
                @supports (overflow: clip) {
                    :where(aspect-ratio-layout) {
                        overflow: var(--ds-aspect-overflow, clip);
                    }
                }
                :where(aspect-ratio-layout > *) {
                    position: absolute;
                    inset: 0;
                }
                :where(aspect-ratio-layout > img),
                :where(aspect-ratio-layout > video),
                :where(aspect-ratio-layout > canvas) {
                    display: block;
                    inline-size: 100%;
                    block-size: 100%;
                    object-fit: var(--ds-aspect-fit, cover);
                    object-position: var(--ds-aspect-position, 50% 50%);
                }
                :where(sticky-layout) {
                    display: block;
                    position: sticky;
                    inset-block-start: var(--ds-sticky-bs, auto);
                    inset-block-end: var(--ds-sticky-be, auto);
                    inset-inline-start: var(--ds-sticky-is, auto);
                    inset-inline-end: var(--ds-sticky-ie, auto);
                    z-index: var(--ds-sticky-z, var(--ds-z-sticky, 20));
                }
                :where(overlay-layout) {
                    position: absolute;
                    inset: var(--ds-overlay-inset, 0);
                    display: grid;
                    align-items: var(--ds-overlay-align, center);
                    justify-items: var(--ds-overlay-justify, center);
                    z-index: var(--ds-overlay-z, var(--ds-z-overlay, 30));
                }
                :where(overlay-layout[fixed]) {
                    position: fixed;
                }
                :where(overlay-layout[stack]) {
                    grid-template: 1fr/1fr;
                }
                :where(overlay-layout[stack] > *) {
                    grid-area: 1/1;
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(z-axis-layout) {
                    display: grid;
                    grid-template: 1fr/1fr;
                    align-items: var(--ds-z-axis-align, center);
                    justify-items: var(--ds-z-axis-justify, center);
                    z-index: var(--ds-z-axis-z, auto);
                }
                :where(z-axis-layout > *) {
                    grid-area: 1/1;
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(icon-text-layout) {
                    display: inline-flex;
                    align-items: var(--ds-icon-text-align, center);
                    gap: var(--ds-icon-text-gap, var(--ds-space-xs-s, 0.5rem));
                }
                :where(icon-text-layout > :first-child) {
                    display: block;
                    inline-size: var(--ds-icon-size, 1em);
                    block-size: var(--ds-icon-size, 1em);
                    flex: 0 0 auto;
                    pointer-events: none;
                }
                :where(icon-text-layout > :last-child) {
                    flex: 1 1 auto;
                    min-inline-size: 0;
                }
                :where(icon-text-layout[reverse]) {
                    flex-direction: row-reverse;
                }
                :where(icon-text-layout[vertical]) {
                    flex-direction: column;
                }
                :where(scrolling-layout) {
                    display: block;
                    overflow-x: hidden;
                    overflow-y: auto;
                    overscroll-behavior: var(
                        --ds-scrolling-overscroll,
                        contain
                    );
                }
                :where(scrolling-layout[horizontally]) {
                    display: flex;
                    flex-wrap: nowrap;
                    overflow-x: auto;
                    overflow-y: hidden;
                    gap: var(--ds-scrolling-gap, var(--ds-gap, 1rem));
                    padding-inline: var(
                        --ds-scrolling-peek,
                        var(--ds-scrolling-pad-inline, 0px)
                    );
                    scroll-padding-inline: var(--ds-scrolling-peek, 0px);
                }
                :where(scrolling-layout[horizontally] > *) {
                    flex: 0 0 var(--ds-scrolling-item, auto);
                    min-inline-size: 0;
                }
                :where(scrolling-layout[snap-horizontally]) {
                    scroll-snap-type: x mandatory;
                }
                :where(scrolling-layout[snap-horizontally] > *) {
                    scroll-snap-align: start;
                }
                :where(scrolling-layout[no-bar]) {
                    scrollbar-width: none;
                }
                scrolling-layout[no-bar]::-webkit-scrollbar {
                    display: none;
                }
                :where(scrolling-layout[smooth]) {
                    scroll-behavior: smooth;
                }
                :where(split-pane-layout) {
                    display: grid;
                    row-gap: var(
                        --ds-split-pane-gap-block,
                        var(--ds-split-pane-gap, var(--ds-gap, 1rem))
                    );
                    column-gap: var(
                        --ds-split-pane-gap-inline,
                        var(--ds-split-pane-gap, var(--ds-gap, 1rem))
                    );
                }
                :where(split-pane-layout > *) {
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(pane-layout) {
                    display: block;
                    grid-area: var(--ds-pane-area);
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(masonry-layout) {
                    display: block;
                    column-width: var(--ds-masonry-min, 16rem);
                    column-count: var(--ds-masonry-columns, auto);
                    column-gap: var(
                        --ds-masonry-gap-inline,
                        var(--ds-masonry-gap, var(--ds-gap, 1rem))
                    );
                }
                :where(masonry-layout > *) {
                    display: inline-block;
                    inline-size: 100%;
                    break-inside: avoid;
                    margin-block: 0;
                    margin-block-end: var(
                        --ds-masonry-gap-block,
                        var(--ds-masonry-gap, var(--ds-gap, 1rem))
                    );
                }
                :where(subgrid-layout) {
                    display: grid;
                    grid-template-columns: subgrid;
                    grid-column: span var(--ds-subgrid-col-span, 1);
                    grid-row: span var(--ds-subgrid-row-span, 1);
                }
                :where(subgrid-layout > *) {
                    min-inline-size: 0;
                    min-block-size: 0;
                }
                :where(subgrid-layout[rows]) {
                    grid-template-rows: subgrid;
                }
                :where(containment-layout) {
                    display: block;
                    container-type: inline-size;
                    contain-intrinsic-size: var(
                        --ds-containment-intrinsic-size
                    );
                }
                :where(presence-layout) {
                    display: contents;
                }
                :where(presence-layout[box]) {
                    display: block;
                }
                :where(presence-layout[data-state="invisible"]) {
                    visibility: hidden;
                }
                :where(
                    presence-layout[data-state="hidden"],
                    :where(presence-layout[data-state="absent"])
                ) {
                    display: none;
                }
            }

            @layer ds.presence {
                :root {
                    --ds-presence-ease-in: cubic-bezier(0.16, 1, 0.3, 1);
                    --ds-presence-ease-out: cubic-bezier(0.7, 0, 0.84, 0);
                }
                @supports (animation-timing-function: linear(0, 1)) {
                    :root {
                        --ds-presence-ease-in: linear(
                            0,
                            0.003 2%,
                            0.013 4%,
                            0.054 8%,
                            0.119 12%,
                            0.204 16%,
                            0.303 20%,
                            0.41 24%,
                            0.517 28%,
                            0.62 32%,
                            0.715 36%,
                            0.8 40%,
                            0.873 44%,
                            0.935 48%,
                            0.983 52%,
                            1 55%,
                            1 100%
                        );
                        --ds-presence-ease-out: linear(
                            1,
                            0.997 2%,
                            0.987 4%,
                            0.946 8%,
                            0.881 12%,
                            0.796 16%,
                            0.697 20%,
                            0.59 24%,
                            0.483 28%,
                            0.38 32%,
                            0.285 36%,
                            0.2 40%,
                            0.127 44%,
                            0.065 48%,
                            0.017 52%,
                            0 55%
                        );
                    }
                }
                @media (prefers-reduced-motion: no-preference) {
                    :where(presence-layout[box][animate~="entry"]) {
                        transition-property: opacity, transform;
                        transition-duration: var(--ds-presence-dur, 220ms);
                    }
                    :where(
                        presence-layout[box][animate~="entry"]:not(
                                [data-state]
                            ),
                        :where(
                            presence-layout[box][animate~="entry"][data-state="visible"]
                        )
                    ) {
                        opacity: 1;
                        transform: none;
                        visibility: visible;
                        transition-timing-function: var(--ds-presence-ease-in);
                    }
                    :where(
                        presence-layout[box][animate~="entry"][data-state="invisible"],
                        :where(
                            presence-layout[box][animate~="entry"][data-state="hidden"]
                        ),
                        :where(
                            presence-layout[box][animate~="entry"][data-state="absent"]
                        )
                    ) {
                        opacity: 0;
                        transform: scale(var(--ds-presence-scale-from, 0.92))
                            translateY(var(--ds-presence-offset, 0.4rem));
                        visibility: hidden;
                        transition-timing-function: var(--ds-presence-ease-out);
                    }
                    @starting-style {
                        :where(
                            presence-layout[box][animate~="entry"]:not(
                                    [data-state]
                                ),
                            :where(
                                presence-layout[box][animate~="entry"][data-state="visible"]
                            )
                        ) {
                            opacity: 0;
                            transform: scale(
                                    var(--ds-presence-scale-from, 0.92)
                                )
                                translateY(var(--ds-presence-offset, 0.4rem));
                        }
                    }
                }
            }

            @layer ds.motion {
                @media (prefers-reduced-motion: reduce) {
                    :where(*) {
                        animation-duration: 0.01ms !important;
                        animation-iteration-count: 1 !important;
                        transition-duration: 0.01ms !important;
                        scroll-behavior: auto !important;
                    }
                }
            }

            /* ══════════════════════════════════════
   DOCS PAGE SKIN
══════════════════════════════════════ */
            html {
                color-scheme: dark;
                background-color: #07111e;
                background-image:
                    linear-gradient(
                        rgba(40, 100, 220, 0.18) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(40, 100, 220, 0.18) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        rgba(40, 100, 220, 0.07) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(40, 100, 220, 0.07) 1px,
                        transparent 1px
                    );
                background-size:
                    80px 80px,
                    80px 80px,
                    16px 16px,
                    16px 16px;
                background-attachment: fixed;
            }

            body {
                font-family: "Space Mono", "Courier New", monospace;
                color: #a8c8f8;
                font-size: 0.9rem;
                line-height: 1.65;
                height: 100dvh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            h1,
            h2,
            h3,
            h4,
            .display {
                font-family: "Barlow Condensed", "Arial Narrow", sans-serif;
                color: #d8eeff;
                line-height: 1.1;
                letter-spacing: -0.01em;
            }
            h1 {
                font-size: calc(var(--ds-text-xxxl) * 1);
                font-weight: 700;
            }
            h2 {
                font-size: var(--ds-text-xl);
                font-weight: 600;
                margin: 0;
            }
            h3 {
                font-size: var(--ds-text-l);
                font-weight: 600;
                margin: 0;
            }
            h4 {
                font-size: var(--ds-text-m);
                font-weight: 600;
                margin: 0;
            }
            p {
                color: #7ba4d4;
                margin: 0;
            }
            a {
                color: #5090ff;
                text-decoration: none;
            }
            a:hover {
                color: #80b8ff;
            }
            code {
                font-family: "Space Mono", monospace;
                font-size: 0.8em;
                color: #5a90d0;
                background: rgba(30, 70, 160, 0.2);
                padding: 1px 5px;
                border-radius: 2px;
            }
            pre code {
                background: none;
                padding: 0;
                color: inherit;
                font-size: 0.8rem;
            }

            /* ── Header ── */
            .site-header {
                background: rgba(5, 14, 28, 0.92);
                border-block-end: 1px solid rgba(48, 100, 220, 0.3);
                backdrop-filter: blur(12px);
                padding: var(--ds-space-s) var(--ds-space-l);
                height: 52px;
                flex-shrink: 0;
            }
            .logo {
                font-family: "Barlow Condensed", sans-serif;
                font-size: 1.05rem;
                font-weight: 700;
                color: #d8eeff;
                letter-spacing: 0.02em;
            }
            .logo span {
                color: #4080ff;
            }
            nav a {
                font-family: "Barlow Condensed", sans-serif;
                font-size: 0.85rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #6090cc;
                transition: color 0.15s;
            }
            nav a:hover,
            nav a.active {
                color: #a8d0ff;
            }

            /* ── Two-column docs layout ── */
            .doc-area {
                display: grid;
                grid-template-columns: 240px 1fr;
                flex: 1;
                overflow: hidden;
                min-height: 0;
            }

            /* ── Sidebar ── */
            .doc-sidebar {
                height: 100%;
                overflow: hidden;
                border-inline-end: 1px solid rgba(48, 100, 220, 0.2);
                background: rgba(4, 10, 22, 0.5);
            }
            .doc-sidebar scrolling-layout {
                height: 100%;
                display: block;
                overflow-y: auto;
                overflow-x: hidden;
                scrollbar-width: thin;
                scrollbar-color: rgba(48, 100, 220, 0.3) transparent;
            }
            .sidebar-heading {
                font-family: "Space Mono", monospace;
                font-size: 0.6rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: #1e3870;
                padding: var(--ds-space-m) var(--ds-space-m) var(--ds-space-xs);
                position: sticky;
                top: 0;
                background: rgba(4, 10, 22, 0.95);
                backdrop-filter: blur(8px);
                z-index: 1;
                border-block-end: 1px solid rgba(48, 100, 220, 0.15);
            }
            .nav-item {
                display: flex;
                align-items: center;
                gap: var(--ds-space-xs);
                padding: 6px var(--ds-space-m);
                font-family: "Space Mono", monospace;
                font-size: 0.7rem;
                color: #3a6090;
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
                border-inline-start: 2px solid transparent;
                text-decoration: none;
                /* Reset <button> defaults */
                border-block: none;
                border-inline-end: none;
                border-radius: 0;
                background: transparent;
                inline-size: 100%;
                text-align: start;
            }
            .nav-item:hover {
                color: #7aa8d8;
                background: rgba(48, 100, 220, 0.07);
            }
            .nav-item.active {
                color: #a0c8f0;
                background: rgba(48, 100, 220, 0.12);
                border-inline-start-color: rgba(80, 130, 255, 0.6);
            }
            .nav-item.is-child {
                padding-inline-start: calc(var(--ds-space-m) + 14px);
                color: #2a5080;
                font-size: 0.65rem;
            }
            .nav-item.is-child:hover {
                color: #6090c0;
            }
            .nav-badge {
                font-size: 0.55rem;
                padding: 1px 4px;
                border-radius: 2px;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                margin-inline-start: auto;
                flex-shrink: 0;
            }
            .badge-system {
                background: rgba(30, 80, 200, 0.3);
                color: #4060a0;
                border: 1px solid rgba(30, 80, 200, 0.3);
            }
            .badge-presence {
                background: rgba(80, 30, 160, 0.3);
                color: #8060a0;
                border: 1px solid rgba(80, 30, 160, 0.3);
            }
            .badge-child {
                background: rgba(20, 60, 120, 0.3);
                color: #304870;
                border: 1px solid rgba(20, 60, 120, 0.3);
            }

            /* ── Main doc content ── */
            .doc-main {
                height: 100%;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .doc-scroll {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                scroll-behavior: smooth;
                scrollbar-width: thin;
                scrollbar-color: rgba(48, 100, 220, 0.3) transparent;
            }
            .doc-content {
                padding: var(--ds-space-xl) var(--ds-space-xl)
                    var(--ds-space-huge);
                max-inline-size: 900px;
            }

            /* ── Blueprint primitive borders ── */
            [data-layout] {
                outline: 1px dashed rgba(48, 110, 255, 0.4);
                outline-offset: 0;
                position: relative;
            }
            [data-layout]:not(
                    presence-layout,
                    sticky-layout,
                    overlay-layout
                )::before {
                content: attr(data-layout);
                position: absolute;
                top: 2px;
                left: 4px;
                font-family: "Space Mono", monospace;
                font-size: 8px;
                letter-spacing: 0.05em;
                color: rgba(48, 110, 255, 0.5);
                line-height: 1;
                pointer-events: none;
                z-index: 100;
            }

            /* ── Doc page components ── */
            .module-header {
                margin-block-end: var(--ds-space-xl);
            }
            .module-title {
                font-family: "Barlow Condensed", sans-serif;
                font-size: calc(var(--ds-text-xxxl) * 0.9);
                font-weight: 700;
                color: #d8eeff;
                letter-spacing: -0.02em;
            }
            .module-type {
                font-family: "Space Mono", monospace;
                font-size: 0.65rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                padding: 2px 8px;
                border-radius: 2px;
                display: inline-block;
                margin-block-end: var(--ds-space-s);
            }
            .type-layout {
                background: rgba(30, 80, 180, 0.25);
                color: #4080c0;
                border: 1px dashed rgba(48, 100, 200, 0.4);
            }
            .type-system {
                background: rgba(20, 60, 140, 0.25);
                color: #3060a0;
                border: 1px dashed rgba(30, 80, 180, 0.4);
            }
            .type-presence {
                background: rgba(60, 20, 120, 0.25);
                color: #8040c0;
                border: 1px dashed rgba(80, 40, 160, 0.4);
            }
            .type-child {
                background: rgba(20, 50, 100, 0.25);
                color: #304880;
                border: 1px dashed rgba(30, 60, 120, 0.4);
            }

            .module-brief {
                font-size: 1rem;
                color: #7090b8;
                line-height: 1.5;
                max-inline-size: 65ch;
                margin-block-end: var(--ds-space-m);
            }

            .section-rule {
                border: none;
                border-block-start: 1px dashed rgba(48, 100, 220, 0.2);
                margin-block: var(--ds-space-xl);
            }

            .section-label {
                font-family: "Space Mono", monospace;
                font-size: 0.6rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: #2a5090;
                display: flex;
                align-items: center;
                gap: 0.75rem;
                margin-block-end: var(--ds-space-m);
            }
            .section-label::before {
                content: "";
                display: block;
                width: 20px;
                height: 1px;
                background: rgba(48, 100, 200, 0.5);
            }

            /* ── Attribute table ── */
            .attr-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.75rem;
                margin-block: var(--ds-space-m);
            }
            .attr-table th {
                font-family: "Space Mono", monospace;
                font-size: 0.6rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: #2a5090;
                text-align: left;
                padding: var(--ds-space-xs) var(--ds-space-s);
                border-block-end: 1px solid rgba(48, 100, 220, 0.25);
            }
            .attr-table td {
                padding: var(--ds-space-xs) var(--ds-space-s);
                border-block-end: 1px solid rgba(48, 100, 220, 0.1);
                vertical-align: top;
                color: #6090b8;
            }
            .attr-table td:first-child {
                color: #80b0e0;
                font-family: "Space Mono", monospace;
            }
            .attr-table td.type-badge {
                color: #4a7080;
            }
            .attr-table td.default-val {
                color: #3a6070;
                font-family: "Space Mono", monospace;
                font-size: 0.7rem;
            }
            .attr-table tr:hover td {
                background: rgba(48, 100, 220, 0.05);
            }
            .bool-pill {
                display: inline-block;
                font-family: "Space Mono", monospace;
                font-size: 0.65rem;
                padding: 1px 6px;
                margin: 1px 2px;
                border: 1px dashed rgba(48, 100, 200, 0.4);
                border-radius: 2px;
                color: #3a6090;
            }

            /* ── Examples ── */
            .example-block {
                border: 1px solid rgba(48, 100, 220, 0.2);
                border-radius: 4px;
                overflow: hidden;
                margin-block: var(--ds-space-l);
            }
            .example-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: var(--ds-space-xs) var(--ds-space-m);
                background: rgba(4, 12, 32, 0.7);
                border-block-end: 1px solid rgba(48, 100, 220, 0.2);
            }
            .example-header h4 {
                font-size: 0.85rem;
                color: #7090b8;
            }
            .example-description {
                font-size: 0.75rem;
                color: #3a6090;
                margin-block-start: 2px;
            }
            .tab-btns {
                display: flex;
                gap: 4px;
            }
            .tab-btn {
                font-family: "Space Mono", monospace;
                font-size: 0.6rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                padding: 3px 10px;
                border: 1px solid rgba(48, 100, 200, 0.3);
                border-radius: 2px;
                background: transparent;
                color: #3a6090;
                cursor: pointer;
                transition: all 0.12s;
            }
            .tab-btn:hover {
                color: #6090c0;
                border-color: rgba(80, 140, 255, 0.5);
            }
            .tab-btn.active {
                background: rgba(48, 100, 200, 0.2);
                color: #80b0f0;
                border-color: rgba(80, 130, 255, 0.6);
            }
            .example-preview {
                padding: var(--ds-space-l);
                background: rgba(3, 8, 20, 0.8);
                min-block-size: 80px;
            }
            .example-code {
                display: none;
            }
            .example-code.visible {
                display: block;
            }
            .example-preview.hidden {
                display: none;
            }
            .example-code pre {
                margin: 0;
                padding: var(--ds-space-m);
                background: rgba(2, 6, 16, 0.9) !important;
                overflow-x: auto;
                font-size: 0.78rem !important;
                line-height: 1.6 !important;
            }

            /* ── Callout boxes ── */
            .callout {
                padding: var(--ds-space-m);
                border-radius: 4px;
                margin-block: var(--ds-space-m);
                font-size: 0.8rem;
            }
            .callout-info {
                background: rgba(20, 60, 140, 0.2);
                border-inline-start: 3px solid rgba(60, 120, 255, 0.4);
                color: #5a88c0;
            }
            .callout-warn {
                background: rgba(120, 80, 10, 0.2);
                border-inline-start: 3px solid rgba(200, 140, 30, 0.4);
                color: #a08040;
            }
            .callout strong {
                color: #a8c8f0;
            }

            /* ── Prev / Next ── */
            .doc-footer {
                border-block-start: 1px solid rgba(48, 100, 220, 0.2);
                padding: var(--ds-space-s) var(--ds-space-xl);
                background: rgba(4, 10, 22, 0.7);
                flex-shrink: 0;
            }
            .nav-btn {
                font-family: "Barlow Condensed", sans-serif;
                font-size: 1.4rem;
                font-weight: 300;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px dashed rgba(48, 100, 220, 0.4);
                border-radius: 2px;
                background: transparent;
                color: #3a6090;
                cursor: pointer;
                transition: all 0.15s;
            }
            .nav-btn:hover {
                color: #80b0f0;
                border-color: rgba(80, 140, 255, 0.7);
                background: rgba(48, 100, 200, 0.1);
            }
            .nav-btn:disabled {
                opacity: 0.25;
                cursor: not-allowed;
            }
            .nav-label {
                font-family: "Space Mono", monospace;
                font-size: 0.65rem;
                color: #1e3870;
                text-align: center;
                line-height: 1.2;
            }

            /* ── Token tables (core page) ── */
            .token-row {
                display: grid;
                grid-template-columns: auto 1fr auto;
                gap: var(--ds-space-m);
                align-items: center;
                padding: var(--ds-space-xxs) 0;
                border-block-end: 1px solid rgba(48, 100, 220, 0.1);
            }
            .token-name {
                font-family: "Space Mono", monospace;
                font-size: 0.7rem;
                color: #4080c0;
            }
            .token-value {
                font-family: "Space Mono", monospace;
                font-size: 0.65rem;
                color: #2a5090;
            }
            .token-swatch {
                width: 32px;
                height: 16px;
                border-radius: 2px;
                border: 1px solid rgba(48, 100, 220, 0.2);
            }

            /* ── Ratio demo ── */
            .ratio-demo-box {
                height: 24px;
                background: rgba(30, 80, 180, 0.4);
                border: 1px solid rgba(60, 120, 255, 0.3);
                border-radius: 2px;
                display: flex;
                align-items: center;
                justify-content: flex-end;
                padding-inline-end: 6px;
                font-family: "Space Mono", monospace;
                font-size: 0.6rem;
                color: #3060a0;
                transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            }

            /* Example component helpers */
            .ex-card {
                background: rgba(10, 24, 50, 0.7);
                border: 1px solid rgba(48, 100, 200, 0.25);
                border-radius: 4px;
            }
            .ex-tag {
                background: rgba(30, 70, 160, 0.3);
                color: #5080c0;
                padding: 2px 8px;
                border-radius: 2px;
                font-size: 0.7rem;
                font-family: "Space Mono", monospace;
                border: 1px solid rgba(48, 100, 200, 0.25);
            }
            .ex-btn {
                font-family: "Barlow Condensed", sans-serif;
                font-size: 0.85rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 6px 16px;
                border: 1px solid rgba(64, 128, 255, 0.4);
                border-radius: 2px;
                background: transparent;
                color: #6090d0;
                cursor: pointer;
                transition: all 0.15s;
            }
            .ex-btn:hover {
                background: rgba(48, 100, 255, 0.15);
                color: #b0d0f8;
            }
            .ex-btn-primary {
                background: rgba(30, 80, 200, 0.25);
                border-color: rgba(80, 140, 255, 0.6);
                color: #b0d0f8;
            }
            .ex-badge {
                background: rgba(20, 60, 160, 0.3);
                color: #4a78c0;
                padding: 2px 8px;
                border-radius: 2px;
                font-size: 0.65rem;
                font-family: "Space Mono", monospace;
                white-space: nowrap;
            }
            .ex-avatar {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: linear-gradient(135deg, #1a3870, #0a2050);
                border: 1px solid rgba(48, 100, 200, 0.3);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Barlow Condensed", sans-serif;
                font-weight: 600;
                color: #6090c0;
                font-size: 0.8rem;
                flex-shrink: 0;
            }
            .ex-divider {
                border: none;
                border-block-start: 1px dashed rgba(48, 100, 220, 0.2);
            }
            .ex-label {
                font-size: 0.65rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: #2a5090;
                font-family: "Space Mono", monospace;
            }
            .ex-text {
                color: #6090b8;
                font-size: 0.8rem;
                line-height: 1.6;
            }
            .ex-title {
                font-family: "Barlow Condensed", sans-serif;
                font-size: 1.1rem;
                font-weight: 600;
                color: #a8c8f0;
            }
            .ex-meta {
                font-size: 0.65rem;
                color: #2a5090;
                font-family: "Space Mono", monospace;
            }
            .ex-code-block {
                background: rgba(5, 15, 40, 0.8);
                border: 1px solid rgba(48, 100, 200, 0.2);
                border-radius: 4px;
                padding: var(--ds-space-m);
                font-family: "Space Mono", monospace;
                font-size: 0.7rem;
                color: #4a7ab0;
                line-height: 1.7;
                overflow-x: auto;
            }
            .ex-stat-num {
                font-family: "Barlow Condensed", sans-serif;
                font-size: 2rem;
                font-weight: 700;
                color: #4080ff;
                line-height: 1;
            }
            .ex-stat-lbl {
                font-size: 0.6rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;

                            code: `<stacked-layout data-layout="stacked-layout" gap="l" deep

                {

                {
                    slug: "z-axis-layout",
                    type: "layout",
                    brief: "An in-flow grid container where all children occupy the same cell and overlap in z-order.",
                    description:
                        "The in-flow alternative to overlay-layout[stack]. Where overlay-layout takes no layout space (position: absolute/fixed), z-axis-layout IS in the document flow and sizes to its tallest child. Use it for image + caption, avatar + badge, card + status overlay — compositions that should displace surrounding content.",
                    attrs: [
                        {
                            name: "align",
                            type: "raw",
                            default: "center",
                            desc: "Block-axis (vertical) placement: center, start, end, stretch.",
                        },
                        {

                            type: "raw",
                            default: "center",
                            desc: "Inline-axis (horizontal) placement: center, start, end, stretch.",

                    booleans: [
                        {

                        },

                    examples: [
                        {
                            title: "Avatar with Notification Badge",
                            desc: "A user avatar with an overlapping notification count badge. z-axis-layout positions the badge at the top-right corner using align-self and justify-self on the badge element, without needing position: absolute.",
                            code: `<cluster-layout data-layout="cluster-layout" gap="xl" style="align-items:flex-start">
  ${[2, 5, 0, 12]
      .map((count, i) => {
          const names = ["A", "J", "P", "M"];
          return `<!-- Avatar ${i + 1}: ${count > 0 ? count + " notifications" : "no badge"} -->

    <div class="ex-avatar" style="width:48px;height:48px;font-size:1.1rem">${names[i]}</div>
    ${
        count > 0
            ? `<!-- Layer 2: Badge (on top, aligned top-right via align-self + justify-self) -->

                            note: "The [isolate] attribute creates a stacking context, ensuring the badge z-index (which is higher by DOM order alone) cannot accidentally stack above content outside the z-axis-layout. The badge position is set with align-self and justify-self — no position: absolute needed.",
                        },
                    ],
                },
            ];

            /* ════════════════════════════════════════════════════════
   SORTED PRIMITIVES INDEX
════════════════════════════════════════════════════════ */

            // Sort alphabetically (core sorts as 'core')
            const SORTED = [...DOCS].sort((a, b) =>
                a.slug.localeCompare(b.slug),
            );
            const slugToIdx = Object.fromEntries(
                SORTED.map((d, i) => [d.slug, i]),
            );

            /* ════════════════════════════════════════════════════════
   SIDEBAR RENDERING
════════════════════════════════════════════════════════ */

            function buildSidebar() {
                const nav = document.getElementById("sidebar-nav");
                const childSlugs = new Set(["pane-layout", "at-breakpoint"]);
                nav.innerHTML = SORTED.map((d) => {
                    const isChild = childSlugs.has(d.slug);
                    const badgeMap = {
                        system: "badge-system",
                        presence: "badge-presence",
                        child: "badge-child",
                    };
                    const badge =
                        d.type === "system"
                            ? '<span class="nav-badge badge-system">system</span>'
                            : d.type === "presence"
                              ? '<span class="nav-badge badge-presence">presence</span>'
                              : isChild
                                ? '<span class="nav-badge badge-child">child</span>'
                                : "";
                    return `<button class="nav-item${isChild ? " is-child" : ""}" data-slug="${d.slug}" onclick="goTo('${d.slug}')">
      <span>${d.slug}</span>${badge}
    </button>`;
                }).join("");
            }

            /* ════════════════════════════════════════════════════════
   CONTENT RENDERING
════════════════════════════════════════════════════════ */

            function typeLabel(type) {
                const map = {
                    layout: "Layout primitive",
                    system: "System / core",
                    presence: "Presence primitive",
                    child: "Child element",
                };
                return map[type] || type;
            }
            function typeCls(type) {
                return (
                    {
                        layout: "type-layout",
                        system: "type-system",
                        presence: "type-presence",
                        child: "type-child",
                    }[type] || "type-layout"
                );
            }

            function renderAttrsTable(attrs) {
                if (!attrs?.length) return "";
                return `
    <div class="section-label">Attributes</div>
    <table class="attr-table">
      <thead><tr><th>Attribute</th><th>Type</th><th>Default</th><th>Description</th></tr></thead>
      <tbody>${attrs
          .map(
              (a) => `
        <tr>
          <td><code>${a.name}</code></td>
          <td class="type-badge">${a.type}</td>
          <td class="default-val">${a.default || "—"}</td>
          <td>${a.desc}</td>
        </tr>`,
          )
          .join("")}
      </tbody>
    </table>`;
            }

            function renderBooleans(booleans) {
                if (!booleans?.length) return "";
                return `
    <div class="section-label">Boolean attributes</div>
    <p style="font-size:.8rem;color:#4a7090;margin-block-end:var(--ds-space-s)">Add the attribute name to the element with no value.</p>
    <div style="display:flex;flex-wrap:wrap;gap:var(--ds-space-xs);margin-block-end:var(--ds-space-m)">
      ${booleans.map((b) => `<div style="margin-block-end:var(--ds-space-xs)"><span class="bool-pill">[${b.name}]</span><span style="font-size:.72rem;color:#2a5080;margin-inline-start:var(--ds-space-xs)">${b.desc}</span></div>`).join("")}
    </div>`;
            }

            function renderExamples(examples, slug) {
                if (!examples?.length) {
                    return `<div class="section-label">Examples</div>
    <div class="callout callout-info">
      <strong>Examples in progress.</strong> This module's examples are being authored. Check back in the next iteration.
    </div>`;
                }
                return (
                    `<div class="section-label">Examples</div>` +
                    examples
                        .map(
                            (ex, i) => `
    <div class="example-block">
      <div class="example-header">
        <stacked-layout gap="tiny">
          <h4>${ex.title}</h4>
          ${ex.desc ? `<p class="example-description">${ex.desc}</p>` : ""}
        </stacked-layout>
        <div class="tab-btns">
          <button class="tab-btn active" onclick="switchTab(this,'${slug}-${i}','preview')">Preview</button>
          <button class="tab-btn" onclick="switchTab(this,'${slug}-${i}','code')">Code</button>
        </div>
      </div>
      <div class="example-preview" id="preview-${slug}-${i}">
        ${ex.code}
      </div>
      <div class="example-code" id="code-${slug}-${i}">
        <pre><code class="language-html">${escapeHtml(ex.code.trim())}</code></pre>
      </div>
      ${ex.note ? `<div style="padding:var(--ds-space-xs) var(--ds-space-m);background:rgba(4,10,28,.6);border-block-start:1px solid rgba(48,100,220,.15);font-size:.72rem;color:#2a5090;font-family:'Space Mono'">${ex.note}</div>` : ""}
    </div>`,
                        )
                        .join("")
                );
            }

            function renderCoreContent() {
                return `
  <div class="module-header">
    <span class="module-type type-system">System</span>
    <div class="module-title">core</div>
    <p class="module-brief">The foundation. Import core.css once — all downstream modules and your own CSS inherit the token layer.</p>
  </div>

  <div class="section-label">Layer order</div>
  <p style="font-size:.8rem;color:#4a7090;margin-block-end:var(--ds-space-m)">The cascade layer order is declared in core.css and governs all styles in the system.</p>
  <div class="ex-code-block">@layer ds.reset, ds.tokens, ds.base, ds.presence,<br>       ds.layout, ds.prose, ds.motion, ds.components, ds.compat;</div>

  <hr class="section-rule">

  <div class="section-label">The ratio system</div>
  <p style="font-size:.8rem;color:#4a7090;margin-block-end:var(--ds-space-m)">
    The spacing and typographic scales are both derived from a single ratio. By default the ratio is <strong>fluid</strong>: it interpolates between a min and max value across the viewport width.
    Apply a ratio preset class to any element to freeze its subtree to a specific ratio.
  </p>
  <div class="attr-table" style="margin-block:var(--ds-space-m)">
  ${[
      [
          "(root default)",
          "Fluid p4→p5",
          "1.3333 → 1.5",
          "The default. Compact on narrow viewports, spacious on wide.",
      ],
      [
          ".minor-third",
          "Minor third",
          "1.2",
          "Very compact. Sidebars, data tables.",
      ],
      [
          ".major-third",
          "Major third",
          "1.25",
          "Tighter type and spacing. UI components, dense layouts.",
      ],
      [
          ".perfect-fourth",
          "Perfect fourth",
          "1.333",
          "Fixed at the lower end of the default range.",
      ],
      [
          ".tritone",
          "√2",
          "1.4142",
          'The original Starwind "silver ratio". Balanced mid-scale.',
      ],
      [
          ".perfect-fifth",
          "Perfect fifth",
          "1.5",
          "Fixed at the upper end of the default range.",
      ],
      [
          ".golden",
          "Golden ratio",
          "1.618",
          "Hero sections, editorial typography. Dramatic scale.",
      ],
      [
          ".octave",
          "Octave",
          "2.0",
          "Extreme contrast. Display type, landing hero headers.",
      ],
      [
          ".silver",
          "True silver",
          "2.4142",
          "Very wide scale. Display type hierarchies only.",
      ],
  ]
      .map(
          ([cls, name, val, note]) => `
    <div class="token-row">
      <span class="token-name">${cls}</span>
      <span style="font-size:.75rem;color:#3a6090">${name} — ${note}</span>
      <span class="token-value">${val}</span>
    </div>`,
      )
      .join("")}
  </div>

  <hr class="section-rule">

  <div class="section-label">Spacing scale</div>
  <p style="font-size:.8rem;color:#4a7090;margin-block-end:var(--ds-space-m)">
    11 steps derived from the ratio. All values update automatically when the ratio changes in a subtree.
    Use the <strong>adjacent pairs</strong> (e.g. <code>s-m</code>) for a midpoint between two steps — useful for fine-grained spacing without breaking the scale.
  </p>
  <div id="scale-demo" style="margin-block:var(--ds-space-m)">
    ${["tiny", "xxxs", "xxs", "xs", "s", "m", "l", "xl", "xxl", "xxxl", "huge"]
        .map(
            (step) => `
    <div class="token-row">
      <span class="token-name">--ds-space-${step}</span>
      <div class="ratio-demo-box" style="width:var(--ds-space-${step});min-width:2px"></div>
      <span class="token-value">r${["⁻⁵", "⁻⁴", "⁻³", "⁻²", "⁻¹", "⁰", "¹", "²", "³", "⁴", "⁵"][["tiny", "xxxs", "xxs", "xs", "s", "m", "l", "xl", "xxl", "xxxl", "huge"].indexOf(step)]}</span>
    </div>`,
        )
        .join("")}
  </div>

  <hr class="section-rule">

  <div class="section-label">Z-index tokens</div>
  <table class="attr-table">
    <thead><tr><th>Token</th><th>Value</th><th>Use</th></tr></thead>
    <tbody>
    ${[
        ["--ds-z-base", "0", "In-flow elements"],
        ["--ds-z-raised", "1", "Cards on hover, floating buttons"],
        ["--ds-z-dropdown", "10", "Menus, dropdowns, tooltips"],
        ["--ds-z-sticky", "20", "Sticky headers, sticky sidebars"],
        ["--ds-z-overlay", "30", "Overlays, drawers, loading screens"],
        ["--ds-z-modal", "40", "Modal dialogs"],
        ["--ds-z-toast", "50", "Toast notifications, critical alerts"],
    ]
        .map(
            ([t, v, u]) =>
                `<tr><td>${t}</td><td>${v}</td><td style="color:#3a6090">${u}</td></tr>`,
        )
        .join("")}
    </tbody>
  </table>

  <hr class="section-rule">

  <div class="callout callout-info">
    <strong>Usage.</strong> Import core once in your HTML: <code>&lt;link rel="stylesheet" href="cdn/.../core.min.css"&gt;</code>.
    All layout modules and your own CSS can then reference <code>--ds-space-*</code>, <code>--ds-text-*</code>,
    and <code>--ds-z-*</code> tokens. No configuration required — the defaults work out of the box.
  </div>`;
            }

            function renderModuleContent(doc) {
                if (doc.isCore) return renderCoreContent();

                return `
  <div class="module-header">
    <span class="module-type ${typeCls(doc.type)}">${typeLabel(doc.type)}</span>
    <div class="module-title">&lt;${doc.slug}&gt;</div>
    <p class="module-brief">${doc.brief}</p>
  </div>

  <div class="section-label">Overview</div>
  <p style="color:#5a88b8;font-size:.85rem;max-inline-size:68ch;line-height:1.7;margin-block-end:var(--ds-space-l)">${doc.description}</p>

  ${doc.attrs?.length ? renderAttrsTable(doc.attrs) : ""}
  ${doc.booleans?.length ? renderBooleans(doc.booleans) : ""}

  <hr class="section-rule">

  ${renderExamples(doc.examples, doc.slug)}
  `;
            }

            /* ════════════════════════════════════════════════════════
   ROUTING
════════════════════════════════════════════════════════ */

            let currentSlug = "core";

            function escapeHtml(str) {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function goTo(slug, suppressSidebarScroll = false) {
                const doc = DOCS.find((d) => d.slug === slug);
                if (!doc) return;
                currentSlug = slug;

                // Update content
                document.getElementById("doc-content").innerHTML =
                    renderModuleContent(doc);

                // Highlight code blocks
                document
                    .querySelectorAll("#doc-content pre code")
                    .forEach((el) => hljs.highlightElement(el));

                // Update sidebar active state
                document.querySelectorAll(".nav-item").forEach((el) => {
                    el.classList.toggle("active", el.dataset.slug === slug);
                });

                // Scroll the active sidebar item into view on navigation (not on initial load)
                const activeItem = document.querySelector(
                    `.nav-item[data-slug="${slug}"]`,
                );
                if (activeItem && !suppressSidebarScroll) {
                    activeItem.scrollIntoView({
                        block: "nearest",
                        behavior: "smooth",
                    });
                }

                // Update prev/next
                updateNavigation();

                // Scroll main content to top
                document.getElementById("doc-scroll").scrollTop = 0;
            }

            function navigate(dir) {
                const idx = slugToIdx[currentSlug];
                const next = SORTED[idx + dir];
                if (next) goTo(next.slug);
            }

            function updateNavigation() {
                const idx = slugToIdx[currentSlug];
                const prev = SORTED[idx - 1];
                const next = SORTED[idx + 1];
                document.getElementById("btn-prev").disabled = !prev;
                document.getElementById("btn-next").disabled = !next;
                document.getElementById("prev-label").textContent =
                    prev?.slug.replace("-layout", "") || "";
                document.getElementById("next-label").textContent =
                    next?.slug.replace("-layout", "") || "";
                document.getElementById("position-label").textContent =
                    `${idx + 1} / ${SORTED.length}`;
            }

            /* ════════════════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════════════════ */

            function switchTab(btn, id, tab) {
                const block = btn.closest(".example-block");
                block
                    .querySelectorAll(".tab-btn")
                    .forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                const preview = document.getElementById("preview-" + id);
                const code = document.getElementById("code-" + id);
                if (tab === "preview") {
                    preview?.classList.remove("hidden");
                    code?.classList.remove("visible");
                } else {
                    preview?.classList.add("hidden");
                    code?.classList.add("visible");
                }
            }

            /* ════════════════════════════════════════════════════════
   KEYBOARD NAVIGATION
════════════════════════════════════════════════════════ */

            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowLeft" && e.altKey) navigate(-1);
                if (e.key === "ArrowRight" && e.altKey) navigate(1);
            });

            /* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */

            buildSidebar();
            // On initial load: go to the hash slug (or core), but DON'T scroll the sidebar
            // to the active item — the spec requires the sidebar to start at the very top.
            // Always start on core (hash navigation not available in sandboxed context)
            goTo("core", /* suppressSidebarScroll= */ true);
        </script>
    </body>
</html>
